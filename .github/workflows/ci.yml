name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        # Includes the offline import-boundary test
        # (tests/test_lint/test_offline_isolation.py), which spawns a clean
        # interpreter to assert the lint core imports no LLM/network modules.
        run: pytest -q

      - name: Self-lint reference fixtures
        # Permanent calibration guard: the vendored Apache-2.0 reference skills
        # must pass the standard profile with no error-level findings.
        run: skill-refine check tests/fixtures/reference_skills/ --profile standard --fail-on error

      - name: Lint
        run: ruff check .
